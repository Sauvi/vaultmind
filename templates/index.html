<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultMind — Private AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c; --surface: #111116; --surface2: #18181f;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
      --text: #e8e8f0; --text-muted: #6b6b80; --text-dim: #3a3a48;
      --accent: #7c6af7; --accent-glow: rgba(124,106,247,0.15); --accent-dim: rgba(124,106,247,0.08);
      --green: #3ecf7e; --green-dim: rgba(62,207,126,0.1);
      --red: #f46b6b; --red-dim: rgba(244,107,107,0.1);
      --amber: #f0a44a; --radius: 10px; --radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

    /* Layout */
    .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 32px; position: sticky; top: 0; height: 100vh; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent-dim); border: 1px solid rgba(124,106,247,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 16px; height: 16px; stroke: var(--accent); }
    .logo-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-size: 13px; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; padding: 12px; background: var(--green-dim); border: 1px solid rgba(62,207,126,0.15); border-radius: var(--radius); }
    .privacy-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--green); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #ollama-status { margin-top: 8px; font-size: 11px; color: var(--text-muted); }

    /* Main */
    .main { padding: 32px; overflow-y: auto; display: flex; flex-direction: column; height: 100vh; }
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }
    .page-header { margin-bottom: 20px; flex-shrink: 0; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .page-sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

    /* ── UNIFIED WORKSPACE ── */
    .workspace { display: flex; flex-direction: column; flex: 1; gap: 16px; min-height: 0; }

    /* Drop zone */
    .dropzone { border: 1.5px dashed var(--border-hover); border-radius: var(--radius-lg); padding: 28px 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; flex-shrink: 0; }
    .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-glow); }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone-loaded { background: var(--surface2); border-color: var(--green); }
    .file-info { display: flex; align-items: center; justify-content: space-between; }
    .file-name { font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .file-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file-change { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 8px; }
    .file-change:hover { text-decoration: underline; }

    /* Quick actions bar */
    .actions-bar { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .action-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .action-chip:hover { border-color: var(--border-hover); color: var(--text); }
    .action-chip.running { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .action-chip svg { width: 13px; height: 13px; }

    /* Chat area */
    .chat-area { flex: 1; display: flex; flex-direction: column; min-height: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 13px; gap: 8px; }
    .chat-empty svg { width: 32px; height: 32px; stroke: var(--text-dim); }

    /* Messages */
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 80%; }
    .msg.user .msg-bubble { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(124,106,247,0.2); border-bottom-right-radius: 4px; }
    .msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.system .msg-bubble { background: transparent; color: var(--text-muted); font-style: italic; font-size: 12px; border: none; margin: 0 auto; }
    .msg.action-result .msg-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; white-space: pre-wrap; line-height: 1.7; width: 100%; max-width: 100%; border-bottom-left-radius: 4px; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
    .msg.ai .msg-avatar { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(124,106,247,0.2); }
    .msg.user .msg-avatar { background: var(--surface2); color: var(--text-muted); }

    /* Chat input */
    .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; outline: none; transition: border-color 0.15s; min-height: 42px; max-height: 120px; }
    .chat-input:focus { border-color: var(--border-hover); }
    .chat-input:disabled { opacity: 0.5; }
    .btn-send { width: 42px; height: 42px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; flex-shrink: 0; }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; stroke: #fff; }
    .btn-reset { height: 42px; padding: 0 12px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all 0.15s; white-space: nowrap; }
    .btn-reset:hover { border-color: var(--border-hover); color: var(--text); }
    .turn-info { font-size: 11px; color: var(--text-dim); padding: 0 4px; align-self: center; white-space: nowrap; }

    /* Download link */
    .download-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 6px 12px; background: rgba(62,207,126,0.1); border: 1px solid rgba(62,207,126,0.2); border-radius: 6px; color: var(--green); font-size: 11px; text-decoration: none; font-family: 'DM Mono', monospace; }
    .download-link:hover { background: rgba(62,207,126,0.18); }

    /* Spinner */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Log / Memory pages */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 500; }
    .log-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-muted); }
    .log-table tr:hover td { background: var(--surface2); }
    .status-ok { color: var(--green); } .status-fail { color: var(--red); }
    .memory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .memory-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .memory-type { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); margin-bottom: 8px; }
    .memory-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .memory-action { font-size: 12px; color: var(--text-muted); }
    .memory-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
    .empty-state { text-align: center; padding: 40px; color: var(--text-dim); font-size: 13px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <span class="logo-name">VaultMind</span>
    </div>

    <nav class="nav">
      <button class="nav-item active" onclick="showPage('workspace', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Workspace
      </button>
      <button class="nav-item" onclick="showPage('log', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor" stroke-linecap="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Audit log
      </button>
      <button class="nav-item" onclick="showPage('memory', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke="currentColor" stroke-linecap="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
        Memory
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="privacy-badge"><div class="dot"></div>100% local · no cloud</div>
      <div id="ollama-status">Checking AI...</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- ── WORKSPACE PAGE ── -->
    <div id="page-workspace" class="page active">
      <div class="page-header">
        <div class="page-title">Workspace</div>
        <div class="page-sub">Upload once — summarize, review, or chat from one place.</div>
      </div>

      <div class="workspace">
        <!-- Drop zone -->
        <div class="dropzone" id="dropzone">
          <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md" onchange="handleFileSelect(this)" />
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:10px">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <div style="font-family:'Syne',sans-serif;font-weight:600;font-size:15px;margin-bottom:4px">Drop your file here</div>
          <div style="font-size:12px;color:var(--text-muted)">.txt · .pdf · .docx · .md</div>
        </div>

        <!-- File loaded state (hidden until file uploaded) -->
        <div id="file-loaded-bar" style="display:none;background:var(--surface);border:1px solid var(--green);border-radius:var(--radius);padding:12px 16px;">
          <div class="file-info">
            <div>
              <div class="file-name">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span id="loaded-filename">—</span>
              </div>
              <div class="file-meta" id="loaded-meta">—</div>
            </div>
            <button class="file-change" onclick="changeFile()">Change file</button>
          </div>
        </div>

        <!-- Quick action chips (shown after file loaded) -->
        <div id="actions-bar" class="actions-bar" style="display:none">
          <button class="action-chip" id="chip-summarize" onclick="runAction('summarize')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="14" x2="3" y2="14"/></svg>
            Summarize
          </button>
          <button class="action-chip" id="chip-legal" onclick="runAction('legal_review')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Legal Review
          </button>
          <button class="action-chip" style="margin-left:auto;opacity:0.5" id="turn-counter">0 turns</button>
          <button class="action-chip" onclick="resetChat()" style="color:var(--text-muted)">↺ New chat</button>
        </div>

        <!-- Unified chat area -->
        <div class="chat-area" id="chat-area">
          <div class="chat-messages" id="chat-messages">
            <div class="chat-empty" id="chat-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Upload a file to get started</span>
            </div>
          </div>
          <div class="chat-input-area">
            <textarea id="chat-input" class="chat-input" rows="1" placeholder="Upload a file first..."
              disabled
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
              oninput="autoResize(this)"></textarea>
            <button class="btn-send" id="btn-send" onclick="sendMessage()" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Audit log page -->
    <div id="page-log" class="page" style="display:none">
      <div class="page-header">
        <div class="page-title">Audit log</div>
        <div class="page-sub">Every action recorded locally.</div>
      </div>
      <div id="log-content"><div class="empty-state">Loading...</div></div>
    </div>

    <!-- Memory page -->
    <div id="page-memory" class="page" style="display:none">
      <div class="page-header">
        <div class="page-title">Memory</div>
        <div class="page-sub">How VaultMind learns your habits.</div>
      </div>
      <div id="memory-content"><div class="empty-state">Loading...</div></div>
    </div>

  </main>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentFilePath = null;
  let turnCount       = 0;
  let isStreaming     = false;

  // ── Ollama status ──────────────────────────────────────────────────────────
  async function checkOllamaStatus() {
    try {
      const res  = await fetch('/status');
      const data = await res.json();
      const el   = document.getElementById('ollama-status');
      if (data.ollama) {
        const model = (data.models[0] || 'phi3.5').split(':')[0];
        el.innerHTML = '<span style="color:var(--green)">&#9679; AI ready &middot; ' + model + '</span>';
      } else {
        el.innerHTML = '<span style="color:var(--amber)">&#9679; Ollama offline</span>';
      }
    } catch {}
  }
  checkOllamaStatus();
  setInterval(checkOllamaStatus, 10000);

  // ── Navigation ─────────────────────────────────────────────────────────────
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const page = document.getElementById('page-' + name);
    page.style.display = 'flex';
    page.classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'log')    loadLog();
    if (name === 'memory') loadMemory();
  }

  // ── File handling ──────────────────────────────────────────────────────────
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
  });

  function handleFileSelect(input) {
    if (input.files.length) uploadFile(input.files[0]);
  }

  async function uploadFile(file) {
    const form = new FormData();
    form.append('file', file);
    form.append('action', 'summarize');
    try {
      const res  = await fetch('/upload', { method: 'POST', body: form });
      const plan = await res.json();
      if (!plan.allowed) { addMessage('system', 'File type not supported. Use PDF, DOCX, TXT, or MD.'); return; }

      currentFilePath = plan.file_path;
      turnCount = 0;

      // Show file bar, hide dropzone
      document.getElementById('dropzone').style.display = 'none';
      document.getElementById('file-loaded-bar').style.display = 'block';
      document.getElementById('actions-bar').style.display = 'flex';
      document.getElementById('loaded-filename').textContent = file.name;
      const info = plan.file_info || {};
      const stats = plan.index_stats || {};
      const chunksInfo = stats.chunks ? ` · ${stats.chunks} chunks indexed` : '';
      const pagesInfo  = stats.total_pages ? ` · ${stats.total_pages} pages` : '';
      document.getElementById('loaded-meta').textContent =
        (info.size_kb ? info.size_kb + ' KB' : '') +
        (file.name.split('.').pop().toUpperCase() ? ' · ' + file.name.split('.').pop().toUpperCase() : '') +
        pagesInfo + chunksInfo + ' · full doc indexed ✓';

      // Enable chat
      const input = document.getElementById('chat-input');
      input.disabled = false;
      input.placeholder = 'Ask anything about ' + file.name + ' ...';
      document.getElementById('btn-send').disabled = false;

      // Clear messages and welcome
      document.getElementById('chat-messages').innerHTML = '';
      document.getElementById('chat-empty') && document.getElementById('chat-empty').remove();
      addMessage('system', '📄 ' + file.name + ' loaded — ask me anything, or use the buttons above to summarize or run a legal review.');

      // Reset chat history on server
      const rf = new FormData(); rf.append('file_path', currentFilePath);
      await fetch('/chat-reset', { method: 'POST', body: rf });

    } catch (err) { addMessage('system', 'Upload failed: ' + err.message); }
  }

  function changeFile() {
    currentFilePath = null;
    document.getElementById('dropzone').style.display = 'block';
    document.getElementById('file-loaded-bar').style.display = 'none';
    document.getElementById('actions-bar').style.display = 'none';
    document.getElementById('chat-messages').innerHTML =
      '<div class="chat-empty" id="chat-empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Upload a file to get started</span></div>';
    const input = document.getElementById('chat-input');
    input.disabled = true; input.placeholder = 'Upload a file first...';
    document.getElementById('btn-send').disabled = true;
    document.getElementById('turn-counter').textContent = '0 turns';
    turnCount = 0;
    // Reset file input
    document.getElementById('file-input').value = '';
  }

  // ── Quick actions (summarize / legal review) ───────────────────────────────
  async function runAction(action) {
    if (!currentFilePath || isStreaming) return;
    const chip = document.getElementById('chip-' + action.replace('_review', '').replace('_', '-'));
    const labels = { summarize: 'Summarize', legal_review: 'Legal Review' };

    isStreaming = true;
    if (chip) chip.classList.add('running');

    addMessage('user', labels[action] || action);
    const bubble = addMessage('ai', '<span class="spinner"></span>');

    try {
      let endpoint;
      if (action === 'legal_review') endpoint = '/legal-stream';
      else if (action === 'summarize') endpoint = '/summarize-stream';
      else endpoint = '/chat-stream';

      const form = new FormData();
      form.append('file_path', currentFilePath);
      if (action === 'chat') {
        form.append('question', 'Please provide a detailed summary of this document in 5 bullet points.');
      }

      const res = await fetch(endpoint, { method: 'POST', body: form });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', output = '';
      bubble.innerHTML = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const token = line.slice(6);
          if (token === '[DONE]') break;
          output += token.replace(/\\n/g, '\n');
          bubble.innerHTML = output.replace(/\n/g, '<br>');
          scrollChat();
        }
      }

      // After legal review, also save to file
      if (action === 'legal_review' || action === 'summarize') {
        const saveForm = new FormData();
        saveForm.append('file_path', currentFilePath);
        saveForm.append('action', action);
        const saved = await fetch('/execute', { method: 'POST', body: saveForm });
        const result = await saved.json();
        if (result.success) {
          const fname = result.output.replace(/\\/g, '/').split('/').pop();
          bubble.innerHTML += '<br><a class="download-link" href="/download/' + fname + '">&#8595; Download report</a>';
        }
      }

      turnCount++;
      updateTurnCounter();

    } catch (err) {
      bubble.innerHTML = 'Error: ' + err.message;
    } finally {
      isStreaming = false;
      if (chip) chip.classList.remove('running');
    }
  }

  // ── Send chat message ──────────────────────────────────────────────────────
  async function sendMessage() {
    if (!currentFilePath || isStreaming) return;
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    input.disabled = true;
    document.getElementById('btn-send').disabled = true;

    addMessage('user', q);
    const bubble = addMessage('ai', '<span class="spinner"></span>');

    // Elapsed timer
    let elapsed = 0;
    const timer = setInterval(() => {
      elapsed++;
      if (bubble.innerHTML.includes('spinner') || bubble.textContent.trim() === '')
        bubble.innerHTML = '<span class="spinner"></span> <span style="font-size:11px;color:var(--text-muted)">' + elapsed + 's</span>';
    }, 1000);

    const form = new FormData();
    form.append('file_path', currentFilePath);
    form.append('question', q);

    try {
      const res = await fetch('/chat-stream', { method: 'POST', body: form });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', answer = '';
      bubble.innerHTML = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const token = line.slice(6);
          if (token === '[DONE]') break;
          answer += token.replace(/\\n/g, '\n');
          bubble.innerHTML = answer.replace(/\n/g, '<br>');
          scrollChat();
        }
      }

      if (!answer) bubble.innerHTML = 'No response — is Ollama running?';
      turnCount++;
      updateTurnCounter();

    } catch (err) {
      bubble.innerHTML = 'Error: ' + err.message;
    } finally {
      clearInterval(timer);
      isStreaming = false;
      input.disabled = false;
      document.getElementById('btn-send').disabled = false;
      input.focus();
    }
  }

  async function resetChat() {
    if (!currentFilePath) return;
    const form = new FormData();
    form.append('file_path', currentFilePath);
    await fetch('/chat-reset', { method: 'POST', body: form });
    turnCount = 0;
    updateTurnCounter();
    document.getElementById('chat-messages').innerHTML = '';
    addMessage('system', 'Conversation cleared. Ask me anything!');
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function addMessage(role, html) {
    const box = document.getElementById('chat-messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    if (role === 'system' || role === 'action-result') {
      wrap.innerHTML = '<div class="msg-bubble">' + html + '</div>';
    } else if (role === 'user') {
      wrap.innerHTML =
        '<div class="msg-avatar">U</div>' +
        '<div class="msg-bubble">' + html + '</div>';
    } else {
      wrap.innerHTML =
        '<div class="msg-avatar">VM</div>' +
        '<div class="msg-bubble">' + html + '</div>';
    }
    box.appendChild(wrap);
    scrollChat();
    return wrap.querySelector('.msg-bubble');
  }

  function scrollChat() {
    const box = document.getElementById('chat-messages');
    box.scrollTop = box.scrollHeight;
  }

  function updateTurnCounter() {
    document.getElementById('turn-counter').textContent =
      turnCount + (turnCount === 1 ? ' turn' : ' turns');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Audit log ──────────────────────────────────────────────────────────────
  async function loadLog() {
    const c = document.getElementById('log-content');
    try {
      const data = await (await fetch('/audit')).json();
      if (!data.log.length) { c.innerHTML = '<div class="empty-state">No actions yet.</div>'; return; }
      const rows = data.log.map(line => {
        const p = line.trim().split(' | ');
        const ts = (p[0]||'').replace('[','').replace(']','');
        const st = (p[1]||'').trim();
        const ac = p[2]||''; const fi = p[3]||'';
        return '<tr><td>'+ts+'</td><td class="'+(st==='OK'?'status-ok':'status-fail')+'">'+st+'</td><td>'+ac+'</td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+fi+'</td></tr>';
      }).join('');
      c.innerHTML = '<table class="log-table"><thead><tr><th>Time</th><th>Status</th><th>Action</th><th>File</th></tr></thead><tbody>'+rows+'</tbody></table>';
    } catch { c.innerHTML = '<div class="empty-state">Could not load log.</div>'; }
  }

  // ── Memory ─────────────────────────────────────────────────────────────────
  async function loadMemory() {
    const c = document.getElementById('memory-content');
    try {
      const data = await (await fetch('/memory')).json();
      const keys = Object.keys(data);
      if (!keys.length) { c.innerHTML = '<div class="empty-state">No patterns yet.</div>'; return; }
      const cards = keys.map(type => {
        const rows = Object.entries(data[type]).map(([a, n]) =>
          '<div class="memory-action-row"><span class="memory-action">'+a+'</span><span class="memory-count">'+n+'&times;</span></div>'
        ).join('');
        return '<div class="memory-item"><div class="memory-type">.'+type+'</div>'+rows+'</div>';
      }).join('');
      c.innerHTML = '<div class="memory-grid">'+cards+'</div>';
    } catch { c.innerHTML = '<div class="empty-state">Could not load memory.</div>'; }
  }
</script>
